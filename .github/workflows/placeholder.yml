name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libasound2-dev
      - name: cargo check
        run: cargo check
        working-directory: src-tauri
      - name: cargo test
        run: cargo test
        working-directory: src-tauri
      - name: cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - name: cargo fmt --check
        run: cargo fmt --check
        working-directory: src-tauri

  e2e-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify E2E testing doc exists
        run: test -f docs/E2E-TESTING.md && echo "E2E-TESTING.md found" || (echo "Missing docs/E2E-TESTING.md" && exit 1)
